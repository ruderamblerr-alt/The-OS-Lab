<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Habit OS — Clock</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;1,9..144,500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1B1B18;
    --ink-soft:#4A4842;
    --paper:#F5F1E6;
    --paper-alt:#ECE4D2;
    --brass:#A9824F;
    --brass-light:#C9A876;
    --navy:#2B3A42;
    --sage:#5C6B54;
    --line: rgba(27,27,24,0.14);
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  html, body{
    height:100%;
    background:var(--paper);
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'IBM Plex Mono', monospace;
    color:var(--ink);
    overflow:hidden;
  }

  .widget{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:18px;
    padding:28px;
  }

  .eyebrow{
    font-size:10.5px;
    letter-spacing:0.22em;
    text-transform:uppercase;
    color:var(--brass);
    display:flex;
    align-items:center;
    gap:8px;
  }
  .eyebrow::before, .eyebrow::after{
    content:'';
    width:14px;
    height:1px;
    background:var(--brass);
    opacity:0.6;
  }

  /* ---------- dial ---------- */
  .dial-wrap{
    position:relative;
    width:min(46vw, 220px);
    height:min(46vw, 220px);
  }

  .dial{
    position:absolute; inset:0;
    border-radius:50%;
    background:var(--paper-alt);
    border:1.5px solid var(--brass);
    box-shadow:
      0 0 0 6px var(--paper),
      0 0 0 7px var(--line),
      0 20px 40px rgba(27,27,24,0.10);
  }

  .tick{
    position:absolute;
    top:0; left:50%;
    width:2px; height:50%;
    transform-origin: 50% 100%;
    transform: translateX(-50%) rotate(calc(var(--i) * 30deg));
  }
  .tick::after{
    content:'';
    position:absolute;
    top:6%; left:0;
    width:100%;
    height:9%;
    background:var(--ink-soft);
    opacity:0.35;
    border-radius:1px;
  }
  .tick.major::after{
    height:13%;
    width:150%;
    left:-25%;
    background:var(--brass);
    opacity:0.9;
  }

  .hand{
    position:absolute;
    left:50%; bottom:50%;
    transform-origin:50% 100%;
    border-radius:4px;
  }
  .hand.hour{
    width:4px; height:26%;
    background:var(--ink);
    transform: translateX(-50%) rotate(0deg);
  }
  .hand.minute{
    width:3px; height:36%;
    background:var(--ink);
    transform: translateX(-50%) rotate(0deg);
  }
  .hand.second{
    width:1.5px; height:40%;
    background:var(--brass);
    transform: translateX(-50%) rotate(0deg);
  }

  .hub{
    position:absolute;
    left:50%; top:50%;
    width:10px; height:10px;
    border-radius:50%;
    background:var(--brass);
    transform:translate(-50%,-50%);
    z-index:5;
  }

  /* ---------- digital readout ---------- */
  .readout{
    text-align:center;
  }
  .time{
    font-family:'Fraunces', serif;
    font-style:italic;
    font-weight:500;
    font-size:clamp(1.5rem, 6vw, 2.1rem);
    letter-spacing:0.01em;
    line-height:1;
  }
  .date{
    margin-top:8px;
    font-size:11.5px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--ink-soft);
  }

  @media (prefers-reduced-motion: reduce){
    .hand{ transition:none !important; }
  }
</style>
</head>
<body>

<div class="widget">
  <span class="eyebrow">The Habit OS · Time</span>

  <div class="dial-wrap">
    <div class="dial"></div>
    <div class="tick major" style="--i:0"></div>
    <div class="tick" style="--i:1"></div>
    <div class="tick" style="--i:2"></div>
    <div class="tick major" style="--i:3"></div>
    <div class="tick" style="--i:4"></div>
    <div class="tick" style="--i:5"></div>
    <div class="tick major" style="--i:6"></div>
    <div class="tick" style="--i:7"></div>
    <div class="tick" style="--i:8"></div>
    <div class="tick major" style="--i:9"></div>
    <div class="tick" style="--i:10"></div>
    <div class="tick" style="--i:11"></div>

    <div class="hand hour" id="hourHand"></div>
    <div class="hand minute" id="minuteHand"></div>
    <div class="hand second" id="secondHand"></div>
    <div class="hub"></div>
  </div>

  <div class="readout">
    <div class="time" id="digitalTime">--:--</div>
    <div class="date" id="digitalDate">LOADING</div>
  </div>
</div>

<script>
  function updateClock(){
    const now = new Date();

    const h = now.getHours();
    const m = now.getMinutes();
    const s = now.getSeconds();

    const hourDeg = (h % 12) * 30 + m * 0.5;
    const minuteDeg = m * 6 + s * 0.1;
    const secondDeg = s * 6;

    document.getElementById('hourHand').style.transform = `translateX(-50%) rotate(${hourDeg}deg)`;
    document.getElementById('minuteHand').style.transform = `translateX(-50%) rotate(${minuteDeg}deg)`;
    document.getElementById('secondHand').style.transform = `translateX(-50%) rotate(${secondDeg}deg)`;

    const h12 = h % 12 === 0 ? 12 : h % 12;
    const ampm = h < 12 ? 'AM' : 'PM';
    const mm = String(m).padStart(2, '0');
    document.getElementById('digitalTime').textContent = `${h12}:${mm} ${ampm}`;

    const days = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
    const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
    document.getElementById('digitalDate').textContent =
      `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}`;
  }

  updateClock();
  setInterval(updateClock, 1000);
</script>

</body>
</html>
